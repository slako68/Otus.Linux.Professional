---
- name: Install and configure nginx
  hosts: nginx
  become: true
  vars:
    nginx_listen_port: 8080

  tasks:
  - name: Install nginx
    ansible.builtin.apt:
      pkg:
      - nginx
      state: latest
      update_cache: yes
    tags:
    - nginx-package
    notify:
    - restart nginx

  - name: NGINX | Create NGINX config file from template
    template:
      src: templates/nginx.conf.j2
      dest: /etc/nginx/nginx.conf
    tags:
    - nginx-configuration
    notify:
    - reload nginx

  handlers:
    - name: restart nginx
      systemd:
        name: nginx
        state: restarted
        enabled: yes

    - name: reload nginx
      systemd:
        name: nginx
        state: reloaded

